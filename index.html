<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced JS Test</title>
    <style>
    body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    margin-top: 80px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

.card {
    margin-top: 30px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    display: inline-block;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.5s ease;
}

.card img {
    border-radius: 50%;
    width: 120px;
}

.hidden {
    display: none;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Random User Generator</h1>

        <button id="btn">Ambil Data</button>

        <div id="loading" class="hidden">Loading...</div>

        <div id="card" class="card hidden">
            <img id="avatar" src="" alt="avatar">
            <h2 id="name"></h2>
            <p id="email"></p>
            <p id="location"></p>
        </div>
    </div>

    <script src="script.js"> </script>
</body>
</html>
